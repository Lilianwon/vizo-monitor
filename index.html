<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VIZO Monitor</title>
  <style>
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system; background:#0b0b0f; color:#e8e8ef; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    h1 { font-size:22px; margin:0 0 12px; }
    .sub { opacity:.7; margin:0 0 18px; font-size:13px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:14px; }
    .card { background: #12121a; border:1px solid rgba(154,236,44,.18); border-radius:18px; padding:16px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .name { font-weight:700; }
    a { color:#9aec2c; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .nums { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:12px; }
    .pill { background:#0b0b0f; border:1px solid rgba(154,236,44,.22); border-radius:14px; padding:10px; }
    .k { font-size:11px; opacity:.7; margin-bottom:6px; }
    .v { font-size:18px; font-weight:800; }
    .err { margin-top:10px; font-size:12px; color:#ff6b6b; white-space:pre-wrap; }
    .foot { margin-top:18px; font-size:12px; opacity:.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prediction Markets Volume Monitor</h1>
    <p class="sub">Daily / Weekly / Monthly volume (numbers). Click Dune to view charts.</p>

    <div id="grid" class="grid"></div>

    <div class="foot" id="foot"></div>
  </div>

  <script>
    async function load() {
      const res = await fetch("./shots/metrics.json?ts=" + Date.now());
      const data = await res.json();

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      for (const m of (data.markets || [])) {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="top">
            <div class="name">${m.name || m.key}</div>
            <div><a href="${m.duneUrl}" target="_blank" rel="noreferrer">Open on Dune ↗</a></div>
          </div>

          <div class="nums">
            <div class="pill"><div class="k">Daily</div><div class="v">${m.daily ?? "-"}</div></div>
            <div class="pill"><div class="k">Weekly</div><div class="v">${m.weekly ?? "-"}</div></div>
            <div class="pill"><div class="k">Monthly</div><div class="v">${m.monthly ?? "-"}</div></div>
          </div>

          ${m.error ? `<div class="err">Error: ${m.error}</div>` : ""}
        `;

        grid.appendChild(card);
      }

      document.getElementById("foot").textContent =
        "Last generated: " + (data.generatedAt || "-");
    }

    load().catch(err => {
      document.getElementById("grid").innerHTML =
        `<div class="card"><div class="err">${String(err)}</div></div>`;
    });
  </script>
</body>
</html>
