<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VIZO 预测市场行情监测</title>

  <style>
    :root{
      --bg:#0B0B0F; --text:#EDEDF4; --muted:rgba(237,237,244,.65);
      --kaspa:#9AEC2C; --shadow: 0 12px 28px rgba(0,0,0,.45);
      --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1100px 700px at 65% 0%, rgba(154,236,44,.12), transparent 60%),
        radial-gradient(800px 500px at 10% 20%, rgba(154,236,44,.08), transparent 55%),
        var(--bg);
    }
    a{color:var(--kaspa); text-decoration:none}
    a:hover{text-decoration:underline}

    .wrap{max-width:1400px; margin:0 auto; padding:18px 18px 40px}
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      padding:14px 16px;
      border:1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(16,19,26,.92), rgba(12,12,18,.92));
      box-shadow: var(--shadow);
      border-radius: var(--r);
    }
    .brand{display:flex; gap:12px; align-items:baseline}
    .logo{font-weight:900; letter-spacing:.6px; font-size:18px; color:var(--kaspa);}
    .title{color:rgba(237,237,244,.82); font-weight:700}
    .status{display:flex; gap:8px; align-items:center; color:rgba(237,237,244,.72); font-size:12px;}
    .dot{width:8px; height:8px; border-radius:50%; background:#20c997; box-shadow: 0 0 0 6px rgba(32,201,151,.10)}
    .tabs{margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; padding:10px 2px 2px;}
    .tab{
      padding:8px 12px; border-radius: 999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(237,237,244,.78);
      cursor:pointer; font-weight:700;
    }
    .tab.active{border-color: rgba(154,236,44,.26); background: rgba(154,236,44,.08); color: var(--text);}

    .section{
      margin-top:14px;
      border:1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(16,19,26,.90), rgba(12,12,18,.90));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{
      padding:12px 14px;
      display:flex; align-items:center; justify-content:space-between;
      background: rgba(154,236,44,.04);
      border-bottom:1px solid rgba(154,236,44,.10);
    }
    .hd h2{margin:0; font-size:14px}
    .muted{color:var(--muted); font-size:12px}
    .btn{
      border:1px solid rgba(154,236,44,.22);
      background: rgba(154,236,44,.08);
      color: var(--text);
      padding:7px 10px;
      border-radius: 12px;
      font-weight:800;
      cursor:pointer; font-size:12px;
    }
    .btn:hover{background: rgba(154,236,44,.12)}

    .cards{
      padding:14px; display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 1200px){ .cards{grid-template-columns: repeat(3, 1fr)} }
    @media (max-width: 820px){ .cards{grid-template-columns: repeat(2, 1fr)} }

    .card{
      border:1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      padding:12px;
    }
    .card .name{font-weight:900; font-size:15px}
    .meta{margin-top:8px; display:flex; gap:10px; flex-wrap:wrap; color:rgba(237,237,244,.72); font-size:12px}

    .shots{
      padding:14px; display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 980px){ .shots{grid-template-columns: 1fr} }

    .shot{
      border:1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      overflow:hidden;
    }
    .shd{
      padding:10px 12px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid rgba(255,255,255,.06);
      background: rgba(0,0,0,.18);
    }
    .badge{
      padding:2px 8px; border-radius: 999px; font-size:12px;
      border:1px solid rgba(154,236,44,.22);
      color:var(--kaspa); background: rgba(154,236,44,.06);
      font-weight:800;
    }
    .imgwrap{width:100%; background:#06070a}
    .imgwrap img{width:100%; display:block; filter: contrast(1.03) saturate(1.06);}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo">VIZO</div>
        <div class="title">预测市场行情监测</div>
      </div>
      <div class="status">
        <span class="dot"></span>
        <span>自动追踪中</span>
        <span class="muted">Last refresh: <span id="lastRefresh">—</span></span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="markets">市场数据</button>
      <button class="tab" data-tab="social">社媒抓取</button>
      <button class="tab" data-tab="analysis">自动分析</button>
    </div>

    <div class="section" id="tab-markets">
      <div class="hd">
        <h2>各预测市场数据（shots/ 目录图片自动更新）</h2>
        <div style="display:flex; gap:10px; align-items:center">
          <span class="muted">前端刷新：每 <b id="intervalLabel">30</b>s</span>
          <button class="btn" id="btnRefresh">立即刷新画面</button>
        </div>
      </div>
      <div class="cards" id="platformCards"></div>
      <div class="shots" id="shotsGrid"></div>
    </div>

    <div class="section" id="tab-social" style="display:none">
      <div class="hd"><h2>社媒抓取（下一步）</h2></div>
      <div style="padding:14px" class="muted">后续接：官方账号追踪 / 热点词条🔥 / 实时内容流。</div>
    </div>

    <div class="section" id="tab-analysis" style="display:none">
      <div class="hd"><h2>自动分析（下一步）</h2></div>
      <div style="padding:14px" class="muted">后续接：舆论 × 交易量 → 给 VIZO 的建议与预警。</div>
    </div>
  </div>

  <script>
    const PLATFORMS = [
      { key:"polymarket", name:"Polymarket", dash:"https://dune.com/datadashboards/polymarket-overview" },
      { key:"kalshi", name:"Kalshi", dash:"https://dune.com/datadashboards/kalshi-overview" },
      { key:"opinion", name:"Opinion", dash:"https://dune.com/datadashboards/opinion" },
      { key:"myriad", name:"Myriad", dash:"https://dune.com/datadashboards/myriad" },
      { key:"predict", name:"Predict", dash:"https://dune.com/datadashboards/predict-prediction-market-predictfun" },
      { key:"ibkr", name:"IBKR ForecastEx", dash:"https://dune.com/datadashboards/ibkr-forecastex" },
      { key:"overtime", name:"Overtime", dash:"https://dune.com/datadashboards/overtime" }
    ];

    const REFRESH_SECONDS = 30;
    const cardsEl = document.getElementById("platformCards");
    const shotsEl = document.getElementById("shotsGrid");
    const lastEl = document.getElementById("lastRefresh");
    document.getElementById("intervalLabel").textContent = REFRESH_SECONDS;

    function nowLocal(){ return new Date().toLocaleString(); }
    function imgUrl(key){ return `shots/${key}.png?t=${Date.now()}`; }

    function renderCards(){
      cardsEl.innerHTML = "";
      for(const p of PLATFORMS){
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <div class="name">${p.name}</div>
          <div class="meta">
            <div><span class="muted">数据源：</span><a href="${p.dash}" target="_blank" rel="noreferrer">Dune Dashboard ↗</a></div>
          </div>
        `;
        cardsEl.appendChild(div);
      }
    }

    function renderShots(){
      shotsEl.innerHTML = "";
      for(const p of PLATFORMS){
        const wrap = document.createElement("div");
        wrap.className = "shot";
        wrap.innerHTML = `
          <div class="shd">
            <span class="badge">${p.name}</span>
            <a class="muted" href="${p.dash}" target="_blank" rel="noreferrer">open ↗</a>
          </div>
          <div class="imgwrap">
            <img alt="${p.name}" src="${imgUrl(p.key)}" onerror="this.style.opacity=.25" />
          </div>
        `;
        shotsEl.appendChild(wrap);
      }
      lastEl.textContent = nowLocal();
    }

    function refreshAll(){
      const imgs = shotsEl.querySelectorAll("img");
      imgs.forEach((img, idx) => {
        img.src = imgUrl(PLATFORMS[idx].key);
        img.style.opacity = 1;
      });
      lastEl.textContent = nowLocal();
    }

    document.getElementById("btnRefresh").addEventListener("click", refreshAll);

    document.querySelectorAll(".tab").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        ["markets","social","analysis"].forEach(k=>{
          document.getElementById(`tab-${k}`).style.display = (k===tab) ? "" : "none";
        });
      });
    });

    renderCards();
    renderShots();
    setInterval(refreshAll, REFRESH_SECONDS * 1000);
  </script>
</body>
</html>
