<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VIZO Monitor</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="hero">
      <div class="hero-left">
        <h1>VIZO Monitor</h1>
        <div class="pill">Daily / Weekly / Monthly Volume</div>
        <div class="sub">
          Data source:
          <code id="dataPath">shots/metrics.json</code>
          <span class="dot">•</span>
          updated:
          <span id="updatedAt">—</span>
        </div>
      </div>
      <div class="hero-right">
        <a class="btn" id="openJson" target="_blank" rel="noreferrer">Open metrics.json</a>
      </div>
    </header>

    <section class="hint" id="statusLine">Loading…</section>

    <section class="grid" id="grid"></section>

    <footer class="foot">
      Tip: if numbers look stale, refresh once. GitHub Pages may cache briefly.
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
