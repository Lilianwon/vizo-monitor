name: Monitor (Social + Dune + Analysis)

on:
  workflow_dispatch:
  schedule:
    # every 15 minutes
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Fetch Dune (metrics.json)
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: node scripts/fetch_dune.cjs

      - name: Fetch Social (social.json)
        env:
          # optional; keep empty if you don't use any social api keys
          SOCIAL_SOURCES: ${{ vars.SOCIAL_SOURCES }}
        run: node scripts/fetch_social.cjs

      - name: Analyze (analysis.json)
        run: node scripts/analyze.cjs

      - name: Commit outputs if changed
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain shots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add shots
            git commit -m "update monitor outputs"
            git push
          else
            echo "No changes in shots/"
          fi
