name: Monitor (Social + Dune + Analysis)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm ci || npm install

      - name: Fetch social
        run: node scripts/fetch_social.cjs

      - name: Fetch dune metrics
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: node scripts/fetch_dune.cjs

      - name: Analyze
        run: node scripts/analyze.cjs

      - name: Commit outputs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shots/* || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update monitor outputs"
          git push
