name: Monitor (Social + Dune + Analysis)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: vizo-monitor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Fetch Dune (metrics.json)
        run: node scripts/fetch_dune.cjs

      - name: Fetch Social (social.json)
        run: node scripts/fetch_social.cjs

      - name: Analyze (analysis.json)
        run: node scripts/analyze.cjs

      - name: Commit outputs if changed
        run: |
          if [ -n "$(git status --porcelain shots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add shots
            git commit -m "update monitor outputs"
            git push
          else
            echo "No changes in shots/"
          fi
