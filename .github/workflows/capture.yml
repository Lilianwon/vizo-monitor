name: Capture Dune Dashboards

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:

# 防止定时 + 手动同时跑互相 push 打架
concurrency:
  group: capture-dune-shots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps chromium

      - name: Run capture
        run: |
          node capture.cjs

      - name: Commit outputs if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 先把本次生成的内容加入暂存区（避免 pull --rebase 报 unstaged changes）
          git add shots/* || true

          # 同步远端最新 main，避免 main -> main (fetch first)
          git pull --rebase origin main

          # pull 之后再 add 一次，确保暂存区包含最新变更
          git add shots/* || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "update dashboard outputs"
          git push origin HEAD:main
