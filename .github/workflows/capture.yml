name: Capture Dune Dashboards

on:
  schedule:
    - cron: "*/15 * * * *"   # 每 15 分钟（UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps chromium

      - name: Run capture
        run: node capture.js

      - name: Commit screenshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shots/*.png
          git diff --cached --quiet || git commit -m "update dashboard screenshots"
          git push
