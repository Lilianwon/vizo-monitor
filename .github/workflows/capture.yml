name: Capture Dune Dashboards

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (UTC)
  workflow_dispatch:

concurrency:
  group: capture-dune-shots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps chromium

      - name: Run capture
        run: |
          node capture.js

      - name: Commit screenshots if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # sync latest main to avoid "fetch first"
          git pull --rebase origin main

          git add shots/*.png || true

          if git diff --cached --quiet; then
            echo "No screenshot changes."
            exit 0
          fi

          git commit -m "update dashboard screenshots" || true
          git push origin main
