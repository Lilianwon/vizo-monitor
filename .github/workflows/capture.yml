name: Capture Dune Dashboards

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:

# 防止定时 + 手动同时跑互相 push 打架
concurrency:
  group: capture-dune-shots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps chromium

      - name: Run capture
        run: |
          node capture.js

      - name: Commit screenshots if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 先把截图加入暂存区（否则无法 rebase）
          git add shots/*.png || true

          # 没变化就退出
          if git diff --cached --quiet; then
            echo "No screenshot changes."
            exit 0
          fi

          # 先提交本地改动
          git commit -m "update dashboard screenshots"

          # 再同步远端（保持线性历史）
          git pull --rebase origin main

          # 推送（如果又被抢先更新，就再 rebase 一次再推）
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
