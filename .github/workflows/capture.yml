name: Capture Dune Dashboards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # every hour

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Run capture
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: node capture.cjs

      - name: Commit outputs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shots/* || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "update dashboard outputs"
            git push
          fi
