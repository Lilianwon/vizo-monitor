name: Capture Dune Dashboards

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (UTC)
  workflow_dispatch:

# 防止定时 + 手动同时跑互相 push 打架
concurrency:
  group: capture-dune-shots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i

      - name: Run capture
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: |
          node capture.js

      - name: Commit outputs if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 关键：先同步远端最新 main（避免 fetch first / 冲突）
          git pull --rebase origin main

          # ✅ 改动在这里：把 shots 目录下所有文件都提交（png + metrics.json）
          git add shots/* || true

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "update dashboard data" || true
          git push origin main
